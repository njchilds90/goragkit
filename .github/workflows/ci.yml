name: ci

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
      - name: go mod tidy check
        run: |
          go mod tidy
          git diff --exit-code
      - name: golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: v1.64
      - name: tests
        run: go test ./... -race -coverprofile=coverage.out
      - name: benchmarks smoke
        run: go test ./... -run '^$' -bench BenchmarkMemoryQuery -benchtime=50x
