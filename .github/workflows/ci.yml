## goragkit v0.1.0

First public release of goragkit — the missing RAG toolkit for Go.

### What's included
- `document` — core types
- `chunker` — fixed-size and sentence-aware chunking
- `embedder` — OpenAI and Ollama adapters
- `store` — in-memory cosine-similarity vector store
- `pipeline` — compose index/query in 4 lines
- `reranker` — keyword boost reranker

### Install
```
go get github.com/njchilds90/goragkit@v0.1.0
```

### Next up
pgvector, Weaviate and Pinecone adapters, BM25 reranker, metadata filtering.
